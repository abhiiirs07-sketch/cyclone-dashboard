name: Keep Railway Alive

on:
  schedule:
    # Ping every 5 minutes — prevents Railway free tier from sleeping
    - cron: '*/5 * * * *'
  workflow_dispatch: # allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping Railway backend
        run: |
          echo "Pinging Railway backend to keep it awake..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 60 \
            https://cyclone-dashboard-production.up.railway.app/api/ping)
          echo "Status: $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "✅ Railway is awake and healthy"
          else
            echo "⚠️  Railway returned $STATUS — may be cold-starting"
          fi
