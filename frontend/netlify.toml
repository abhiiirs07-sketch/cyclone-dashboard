[build]
  base    = "."
  command = "npm run build"
  publish = "out"

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── API Proxy ──────────────────────────────────────────────────────────────
# All /api/* requests are proxied through Netlify → Railway backend.
# This means the frontend ONLY talks to cyclone-dashboard-2025.netlify.app
# (same domain, no CORS issues, works on ANY network worldwide).
[[redirects]]
  from   = "/api/*"
  to     = "https://cyclone-dashboard-production.up.railway.app/api/:splat"
  status = 200
  force  = true
  [redirects.headers]
    X-Forwarded-Host = "cyclone-dashboard-2025.netlify.app"
    Access-Control-Allow-Origin = "*"
